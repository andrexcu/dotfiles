################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=Virtual-1, 1920x1080@60, auto, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = konsole
$fileManager = dolphin
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = LIBGL_ALWAYS_SOFTWARE=1 kitty
# exec-once = hyprctl dispatch workspace 2
# exec-once = [ workspace 1 silent; float; move 800 200 ] LIBGL_ALWAYS_SOFTWARE=1 kitty --hold -e fastfetch
exec-once = nm-applet &
# exec-once = hyprpaper & firefox
exec-once = awww-daemon
exec-once = qs -c caelestia
# exec-once = hyprctl setcursor Bibata-Modern-Classic 24
# exec-once = qs -c panel
# exec-once = /usr/bin/qs -c panel --no-terminal &


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE,24

# env = XCURSOR_THEME,Bibata-Modern-Classic
# env = HYPRCURSOR_THEME,Bibata-Modern-Classic

env = QT_QPA_PLATFORMTHEME, kde 
env = QT_STYLE_OVERRIDE, kvantum

env = WLR_NO_HARDWARE_CURSORS,1
cursor.no_hardware_cursors = 1
cursor {
    no_hardware_cursors = true
}
